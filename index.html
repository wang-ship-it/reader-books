<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reader Books Updates</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fbf8f2;
        color: #241c18;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }

      p {
        line-height: 1.7;
        color: #6f625a;
      }

      a {
        color: #9e2a25;
        font-weight: 700;
      }

      .book {
        display: grid;
        grid-template-columns: 144px 1fr;
        gap: 24px;
        margin-top: 32px;
        padding: 20px;
        border: 1px solid #ded5c7;
        border-radius: 14px;
        background: #fffdf9;
      }

      .book img {
        display: block;
        width: 144px;
        aspect-ratio: 2 / 3;
        object-fit: cover;
        border-radius: 8px;
      }

      .book h2 {
        margin: 4px 0 8px;
      }

      @media (max-width: 520px) {
        .book {
          grid-template-columns: 104px 1fr;
          gap: 16px;
          padding: 14px;
        }

        .book img {
          width: 104px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Reader Books Updates</h1>
      <p>《九劫剑骨》和《祖师殿里供的是我》共用同一个 Android 阅读 App。</p>
      <p>
        <a href="./manifest.json">章节更新源</a>
        ·
        <a href="./app-update.json">App 更新源</a>
        ·
        <a href="https://raw.githubusercontent.com/wang-ship-it/reader-books/main/_apk/app-release.apk">下载 APK</a>
      </p>
      <section class="book">
        <a href="./books/祖师殿里供的是我/cover.png">
          <img src="./books/祖师殿里供的是我/cover.png" alt="《祖师殿里供的是我》封面">
        </a>
        <div>
          <h2>祖师殿里供的是我</h2>
          <p>已加入“本地书阁”双书架，发布第1—80章。APK只保留封面，正文安装后从更新中心下载。</p>
          <p>
            <a href="https://raw.githubusercontent.com/wang-ship-it/reader-books/main/_apk/app-release.apk">下载双书架 App</a>
            ·
            <a href="./books/祖师殿里供的是我/manifest.json">查看章节清单</a>
            ·
            <a href="./books/祖师殿里供的是我/cover.png">查看封面原图</a>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
